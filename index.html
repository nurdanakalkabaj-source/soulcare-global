<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>SoulCare | Professional Admission System</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #010409; --card: #0d1117; --yes: #238636; --no: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; }
        header { background: linear-gradient(135deg, #1e1b4b, #4338ca); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .nav { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav button { padding: 12px 25px; border-radius: 20px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; font-weight: bold; }
        
        .container { max-width: 850px; margin: 30px auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #30363d; }

        .q-row { margin-bottom: 45px; text-align: center; border-bottom: 1px solid #21262d; padding-bottom: 25px; }
        .q-text { font-size: 20px; margin-bottom: 25px; display: block; color: white; }
        .circles { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .circles input { display: none; }
        .circle { border-radius: 50%; border: 3px solid #484f58; cursor: pointer; display: inline-block; width: 45px; height: 45px; }

        input[value*="Y"]:checked + .circle { background: var(--yes); border-color: var(--yes); }
        input[value*="N"]:checked + .circle { background: var(--no); border-color: var(--no); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #010409; border: 1px solid #30363d; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 20px; background: #238636; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .res-item { background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #30363d; }
        .status-tag { padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .status-accepted { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .status-rejected { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>SoulCare Admission Portal</h1>
    <div class="nav">
        <button onclick="tab('mbti')">1. MBTI Тест</button>
        <button onclick="tab('grant')">2. Admission Decision</button>
    </div>
</header>

<div class="container">
    <section id="mbti" class="section active">
        <div class="card">
            <h2 style="text-align:center">Тұлғалық психотипті анықтау</h2>
            <div id="mbti-container"></div>
            <button class="btn-go" onclick="calcMBTI()">Нәтижені сақтау</button>
        </div>
    </section>

    <section id="grant" class="section">
        <div class="card">
            <h2>Грантқа қабылдану жүйесі</h2>
            <div class="grid">
                <div>
                    <label>ҰБТ балы (0-140):</label> <input type="number" id="ubt" placeholder="120">
                    <label>SAT балы (400-1600):</label> <input type="number" id="sat" placeholder="1300">
                    <label>IELTS (0-9.0):</label> <input type="number" id="ielts" step="0.5" placeholder="6.5">
                    <label>GPA (0-5.0):</label> <input type="number" id="gpa" step="0.1" placeholder="4.5">
                </div>
                <div>
                    <label>Мамандық:</label>
                    <select id="major">
                        <option value="tech">IT / Инженерия (Analyst)</option>
                        <option value="med">Медицина (Caregiver)</option>
                        <option value="art">Өнер / Дизайн (Explorer)</option>
                        <option value="biz">Бизнес / Құқық (Leader)</option>
                    </select>
                    <label>МБТИ Типіңіз:</label>
                    <input type="text" id="mbti-res-input" readonly style="color: var(--primary); font-weight:bold;">
                    <label>Волонтерлық (сағат):</label> <input type="number" id="vol" value="0">
                    <label>Наградалар:</label> <input type="number" id="awards" value="0">
                </div>
            </div>
            <button class="btn-go" onclick="processAdmission()">Шешімді шығару</button>
            <div id="final-results" style="margin-top:25px;"></div>
        </div>
    </section>
</div>

<script>
    const mbtiQs = [
        {q: "Жаңа адамдармен оңай тіл табысамын", t: "EI"},
        {q: "Нақты деректерге қарағанда интуицияға сенемін", t: "SN"},
        {q: "Шешім қабылдағанда логика бірінші орында", t: "TF"},
        {q: "Жұмыс орным әрқашан жинақы", t: "JP"}
    ];
    // 30 сұраққа толтыру
    const questions = [];
    for(let i=0; i<30; i++) { questions.push({...mbtiQs[i%4], q: mbtiQs[i%4].q + " (S-" + (i+1) + ")"}); }

    const box = document.getElementById('mbti-container');
    questions.forEach((q, i) => {
        box.innerHTML += `<div class="q-row"><span class="q-text">${i+1}. ${q.q}</span><div class="circles">
            <span style="color:var(--yes)">ИӘ</span>
            <label><input type="radio" name="r${i}" value="${q.t[0]}3Y"><span class="circle"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[0]}1Y"><span class="circle" style="width:35px; height:35px;"></span></label>
            <label><input type="radio" name="r${i}" value="0"><span class="circle" style="width:25px; height:25px;"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[1]}1N"><span class="circle" style="width:35px; height:35px;"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[1]}3N"><span class="circle"></span></label>
            <span style="color:var(--no)">ЖОҚ</span></div></div>`;
    });

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function calcMBTI() {
        let sc = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
        for(let i=0; i<30; i++) {
            let v = document.querySelector(`input[name="r${i}"]:checked`)?.value;
            if(v && v[0] !== '0') sc[v[0]] += parseInt(v[1]);
        }
        let res = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        document.getElementById('mbti-res-input').value = res;
        alert("МБТИ типі сақталды: " + res);
        tab('grant');
    }

    function processAdmission() {
        let ubt = parseInt(document.getElementById('ubt').value) || 0;
        let sat = parseInt(document.getElementById('sat').value) || 0;
        let ielts = parseFloat(document.getElementById('ielts').value) || 0;
        let mbti = document.getElementById('mbti-res-input').value;
        let major = document.getElementById('major').value;

        const unis = [
            {n:"Harvard University", country:"USA", reqUbt:135, reqSat:1550, reqIelts:7.5, pref:"INTJ, ENTJ"},
            {n:"Oxford University", country:"UK", reqUbt:135, reqSat:1500, reqIelts:7.5, pref:"INFJ, INTJ"},
            {n:"KAIST", country:"Korea", reqUbt:130, reqSat:1450, reqIelts:7.0, pref:"INTP, ISTP"},
            {n:"Tsinghua Uni", country:"China", reqUbt:130, reqSat:1450, reqIelts:7.0, pref:"ESTJ, ENTJ"},
            {n:"Nazarbayev Uni", country:"KZ", reqUbt:125, reqSat:1350, reqIelts:6.5, pref:"ALL"},
            {n:"KBTU", country:"KZ", reqUbt:115, reqSat:0, reqIelts:5.5, pref:"ALL"},
            {n:"AITU", country:"KZ", reqUbt:110, reqSat:0, reqIelts:5.0, pref:"ALL"}
        ];

        let h = "<h3>Қабылдау комиссиясының шешімі:</h3>";
        unis.forEach(u => {
            let isAccepted = (ubt >= u.reqUbt && ielts >= u.reqIelts);
            if(u.reqSat > 0 && sat < u.reqSat) isAccepted = false;
            
            // MBTI сәйкестігі (Шансқа әсері)
            let mbtiMatch = u.pref.includes(mbti) || u.pref === "ALL";
            let chance = isAccepted ? (mbtiMatch ? 95 : 70) : (ubt > u.reqUbt - 10 ? 40 : 5);

            h += `<div class="res-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${u.n}</b> (${u.country})</span>
                    <span class="status-tag ${isAccepted ? 'status-accepted' : 'status-rejected'}">
                        ${isAccepted ? 'Accepted' : 'Rejected'}
                    </span>
                </div>
                <div style="margin-top:10px; font-size:14px; color:#8b949e;">
                    Түсу мүмкіндігі: ${chance}% | MBTI сәйкестігі: ${mbtiMatch ? 'Жоғары' : 'Орташа'}
                </div>
            </div>`;
        });
        document.getElementById('final-results').innerHTML = h;
    }
</script>
</body>
</html>
