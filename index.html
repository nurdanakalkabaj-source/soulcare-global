<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>SoulCare | Final Presentation Version</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #010409; --card: #0d1117; --yes: #238636; --no: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; }
        header { background: linear-gradient(135deg, #1e1b4b, #4338ca); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .nav { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav button { padding: 12px 25px; border-radius: 20px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; font-weight: bold; }
        .nav button:hover { background: #30363d; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* MBTI - CLEAN CIRCLES */
        .q-row { margin-bottom: 45px; text-align: center; border-bottom: 1px solid #21262d; padding-bottom: 25px; }
        .q-text { font-size: 20px; font-weight: 500; margin-bottom: 25px; display: block; color: white; }
        .circles { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .circles input { display: none; }
        .circle { border-radius: 50%; border: 3px solid #484f58; cursor: pointer; transition: 0.2s; display: inline-block; }
        
        .v-l { width: 55px; height: 55px; } .l { width: 40px; height: 40px; } .s { width: 28px; height: 28px; }

        input[value*="Y"]:checked + .circle { background: var(--yes); border-color: var(--yes); box-shadow: 0 0 15px var(--yes); }
        input[value*="N"]:checked + .circle { background: var(--no); border-color: var(--no); box-shadow: 0 0 15px var(--no); }

        /* FORM STYLE */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 14px; color: #8b949e; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #010409; border: 1px solid #30363d; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 20px; background: #238636; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 15px; }
        
        .res-item { background: #161b22; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #30363d; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>SoulCare Navigator</h1>
    <div class="nav">
        <button onclick="tab('mbti')">1. MBTI ТЕСТ (30 сұрақ)</button>
        <button onclick="tab('grant')">2. ГРАНТ ЕШЕПТЕУ</button>
    </div>
</header>

<div class="container">
    <section id="mbti" class="section active">
        <div class="card">
            <h2 style="color:white; text-align:center">Тұлғалық психотипті анықтау</h2>
            <div id="mbti-container"></div>
            <button class="btn-go" onclick="calcMBTI()">НӘТИЖЕНІ ШЫҒАРУ</button>
            <div id="mbti-final"></div>
        </div>
    </section>

    <section id="grant" class="section">
        <div class="card">
            <h2 style="color:white">Грант және Мүмкіндіктер</h2>
            <div class="grid">
                <div>
                    <label>ҰБТ балы (0-140):</label> <input type="number" id="ubt" value="115">
                    <label>SAT балы (400-1600):</label> <input type="number" id="sat" value="1300">
                    <label>IELTS / TOEFL:</label> <input type="number" id="ielts" step="0.5" value="6.5">
                    <label>GPA (4.0/5.0):</label> <input type="number" id="gpa" step="0.1" value="4.7">
                </div>
                <div>
                    <label>Комбинация:</label>
                    <select id="comb">
                        <option>Математика - Физика</option><option>Математика - Информатика</option>
                        <option>Биология - Химия</option><option>География - Математика</option>
                        <option>Дүниежүзі тарихы - Ағылшын</option><option>Құқық - Тарих</option>
                    </select>
                    <label>Волонтерлық (сағат):</label> <input type="number" id="vol" value="60">
                    <label>Наградалар саны:</label> <input type="number" id="awards" value="3">
                </div>
            </div>
            <button class="btn-go" style="background:#8b5cf6" onclick="calcGrant()">ГРАНТТАРДЫ КӨРУ</button>
            <div id="grant-final" style="margin-top:25px;"></div>
        </div>
    </section>
</div>

<script>
    const questions = [
        {q: "Жаңа адамдармен танысқанда өзіңізді энергиялы сезінесіз бе?", t: "EI"},
        {q: "Көбіне нақты деректер мен практикаға сүйенесіз бе?", t: "SN"},
        {q: "Шешім қабылдағанда логика сезімнен маңызды ма?", t: "TF"},
        {q: "Жұмысты бастамас бұрын нақты жоспар құрасыз ба?", t: "JP"},
        {q: "Көпшілік алдында сөйлегенді ұнатасыз ба?", t: "EI"},
        {q: "Болашақ туралы қиялдағанды жақсы көресіз бе?", t: "SN"},
        {q: "Адамдардың көңіліне қарағанша, шындықты айтқан дұрыс па?", t: "TF"},
        {q: "Өзгерістерден гөрі тұрақтылықты ұнатасыз ба?", t: "JP"},
        {q: "Жалғыз қалғанда энергия жинайсыз ба?", t: "EI"},
        {q: "Заттардың қалай жасалғанына (детальдарға) мән бересіз бе?", t: "SN"},
        {q: "Адамдардың эмоциясын түсіну сізге оңай ма?", t: "TF"},
        {q: "Бөлмеңіз әрқашан жинақы ма?", t: "JP"},
        {q: "Тәуекелге бел буу сізге қызық па?", t: "EI"},
        {q: "Теориялық идеялар сізді шабыттандыра ма?", t: "SN"},
        {q: "Дау-дамайда әділдікті бірінші қоясыз ба?", t: "TF"},
        {q: "Ережелер мен тәртіпті қатаң сақтайсыз ба?", t: "JP"},
        {q: "Көшбасшы болу сізге ұнай ма?", t: "EI"},
        {q: "Қиялдан гөрі шындық маңызды ма?", t: "SN"},
        {q: "Басқалардың пікірі сізге қатты әсер ете ме?", t: "TF"},
        {q: "Уақытты қатаң басқаруды ұнатасыз ба?", t: "JP"},
        {q: "Топтық жұмыста белсендісіз бе?", t: "EI"},
        {q: "Жаңа мүмкіндіктерді іздегенді ұнатасыз ба?", t: "SN"},
        {q: "Сыни пікірлерді суыққанды қабылдайсыз ба?", t: "TF"},
        {q: "Күтпеген оқиғалар сізге ұнай ма?", t: "JP"},
        {q: "Әңгімені бірінші болып бастайсыз ба?", t: "EI"},
        {q: "Нақты нұсқаулықтармен жұмыс істеген оңай ма?", t: "SN"},
        {q: "Мейірімділік әділдіктен жоғары ма?", t: "TF"},
        {q: "Заттардың орнында тұрғанын қалайсыз ба?", t: "JP"},
        {q: "Тез шешім қабылдайсыз ба?", t: "EI"},
        {q: "Оқиғалардың астарын (мағынасын) іздейсіз бе?", t: "SN"}
    ];

    const box = document.getElementById('mbti-container');
    questions.forEach((q, i) => {
        box.innerHTML += `
            <div class="q-row">
                <span class="q-text">${i+1}. ${q.q}</span>
                <div class="circles">
                    <span style="color:var(--yes)">ИӘ</span>
                    <label><input type="radio" name="r${i}" value="${q.t[0]}3Y"><span class="circle v-l"></span></label>
                    <label><input type="radio" name="r${i}" value="${q.t[0]}1Y"><span class="circle l"></span></label>
                    <label><input type="radio" name="r${i}" value="0"><span class="circle s"></span></label>
                    <label><input type="radio" name="r${i}" value="${q.t[1]}1N"><span class="circle l"></span></label>
                    <label><input type="radio" name="r${i}" value="${q.t[1]}3N"><span class="circle v-l"></span></label>
                    <span style="color:var(--no)">ЖОҚ</span>
                </div>
            </div>`;
    });

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function calcMBTI() {
        let sc = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
        for(let i=0; i<30; i++) {
            let v = document.querySelector(`input[name="r${i}"]:checked`)?.value;
            if(v && v[0] !== '0') sc[v[0]] += parseInt(v[1]);
        }
        let res = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        document.getElementById('mbti-final').innerHTML = `
            <div class="card" style="margin-top:20px; border-color:var(--yes); background:#161b22">
                <h2 style="margin:0; color:var(--yes)">Сіздің типіңіз: ${res}</h2>
                <p>Бұл тип туралы толық мәлімет Грант бөліміне сақталды.</p>
                <button class="btn-go" onclick="tab('grant')">Келесі қадамға өту</button>
            </div>`;
    }

    function calcGrant() {
        let ubt = parseInt(document.getElementById('ubt').value) || 0;
        let sat = parseInt(document.getElementById('sat').value) || 0;
        let bonus = (parseInt(document.getElementById('vol').value) * 0.1) + (parseInt(document.getElementById('awards').value) * 5);
        let total = (ubt * 0.4) + (sat * 0.05) + bonus;

        const unis = [
            {n:"Nazarbayev Uni", l:"KZ", t:100}, {n:"KBTU", l:"KZ", t:85}, {n:"AITU", l:"KZ", t:80},
            {n:"Harvard", l:"USA", t:150}, {n:"KAIST", l:"Korea", t:110}, {n:"KazNU", l:"KZ", t:75}
        ];

        let h = "<h3>Грант алу мүмкіндігі (%):</h3>";
        unis.forEach(u => {
            let p = Math.min(Math.round((total/u.t)*100), 99);
            h += `<div class="res-item"><span>${u.n} (${u.l})</span><b style="color:var(--yes)">${p}%</b></div>`;
        });
        document.getElementById('grant-final').innerHTML = h;
    }
</script>
</body>
</html>
