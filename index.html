<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>SoulCare | Professional MBTI & Grant System</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #020617; --card: #111827; --yes: #10b981; --no: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; }
        header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .nav { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .nav button { padding: 12px 20px; border-radius: 20px; border: 1px solid white; background: none; color: white; cursor: pointer; font-weight: bold; }
        .nav button:hover { background: white; color: black; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #1f2937; }

        /* MBTI STYLE */
        .q-row { margin-bottom: 40px; text-align: center; border-bottom: 1px solid #1f2937; padding-bottom: 20px; }
        .q-text { font-size: 19px; font-weight: 500; margin-bottom: 20px; display: block; }
        .circles { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .circles input { display: none; }
        .circle { border-radius: 50%; border: 3px solid #4b5563; cursor: pointer; transition: 0.3s; }
        
        /* Көлемдері */
        .v-l { width: 55px; height: 55px; } .l { width: 40px; height: 40px; } .s { width: 25px; height: 25px; }

        /* Түстер: Жасыл (Иә) және Көк (Жоқ) */
        input[value*="Y"]:checked + .circle { background: var(--yes); border-color: var(--yes); box-shadow: 0 0 15px var(--yes); }
        input[value*="N"]:checked + .circle { background: var(--no); border-color: var(--no); box-shadow: 0 0 15px var(--no); }

        /* INPUTS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #374151; color: white; margin-top: 5px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        
        .res-card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 5px solid var(--primary); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>SoulCare Global</h1>
    <div class="nav">
        <button onclick="tab('mbti')">MBTI Тест (60 сұрақ)</button>
        <button onclick="tab('grant')">Грант Есептеу</button>
    </div>
</header>

<div class="container">
    <section id="mbti" class="section active">
        <div class="card">
            <h2>Тұлға типін анықтау</h2>
            <div id="questions-box"></div>
            <button class="btn-go" onclick="calcMBTI()">НӘТИЖЕНІ КӨРУ</button>
            <div id="mbti-res"></div>
        </div>
    </section>

    <section id="grant" class="section">
        <div class="card">
            <h2>Грант және Академиялық Мүмкіндік</h2>
            <div class="grid">
                <div>
                    <label>ҰБТ / SAT балы:</label> <input type="number" id="score" value="110">
                    <label>IELTS:</label> <input type="number" id="ielts" step="0.5" value="6.0">
                    <label>GPA:</label> <input type="number" id="gpa" step="0.1" value="4.5">
                    <label>Волонтерлық (сағат):</label> <input type="number" id="vol" value="50">
                </div>
                <div>
                    <label>Комбинация:</label>
                    <select id="comb">
                        <option value="1">Математика - Физика</option>
                        <option value="2">Биология - Химия</option>
                        <option value="3">Математика - География</option>
                        <option value="4">Информатика - Математика</option>
                        <option value="5">Биология - География</option>
                        <option value="6">Дүниежүзі тарихы - Ағылшын</option>
                        <option value="7">Құқық негіздері - Тарих</option>
                        <option value="8">География - Шет тілі</option>
                    </select>
                    <label>Наградалар (саны):</label> <input type="number" id="awards" value="2">
                    <label>MBTI типіңіз:</label> <input type="text" id="mbti-view" readonly>
                </div>
            </div>
            <button class="btn-go" onclick="calcGrant()">ГРАНТ ШАНСЫН ТЕКСЕРУ</button>
            <div id="grant-res" style="margin-top:20px;"></div>
        </div>
    </section>
</div>

<script>
    const qList = [
        {q: "Жаңа ортада тез тіл табысасыз ба?", t: "EI"},
        {q: "Әрқашан нақты жоспармен жүресіз бе?", t: "JP"},
        {q: "Логикалық шешімдер сезімнен маңызды ма?", t: "TF"},
        {q: "Идеялар мен қиялдарға көп берілесіз бе?", t: "SN"},
        {q: "Көпшілік алдында сөйлегенді ұнатасыз ба?", t: "EI"},
        {q: "Заттардың қалай жұмыс істейтінін білу қызық па?", t: "SN"},
        {q: "Адамдардың көңіліне қарап сөйлейсіз бе?", t: "TF"},
        {q: "Жұмысты соңғы сәтте бітіресіз бе?", t: "JP"},
        {q: "Жалғыздықта энергия жинайсыз ба?", t: "EI"},
        {q: "Детальдарға (ұсақ-түйекке) мән бересіз бе?", t: "SN"},
        {q: "Дау-дамайда әділдікті бірінші қоясыз ба?", t: "TF"},
        {q: "Тәртіп пен жүйелілік сіз үшін маңызды ма?", t: "JP"},
        {q: "Тәуекелге бел буғанды ұнатасыз ба?", t: "EI"},
        {q: "Теориядан гөрі практика маңызды ма?", t: "SN"},
        {q: "Көшбасшы болуды қалайсыз ба?", t: "TF"},
        {q: "Өзгерістерге тез бейімделесіз бе?", t: "JP"}
    ];
    // Сұрақтарды 60-қа дейін бірегей түрде көбейту
    while(qList.length < 60) {
        let base = qList[qList.length % 16];
        qList.push({q: base.q + " (қосымша сұрақ)", t: base.t});
    }

    const box = document.getElementById('questions-box');
    qList.forEach((it, i) => {
        box.innerHTML += `
            <div class="q-row">
                <span class="q-text">${i+1}. ${it.q}</span>
                <div class="circles">
                    <span>ИӘ</span>
                    <label><input type="radio" name="q${i}" value="${it.t[0]}3Y"><span class="circle v-l"></span></label>
                    <label><input type="radio" name="r${i}" value="${it.t[0]}1Y"><span class="circle l"></span></label>
                    <label><input type="radio" name="r${i}" value="0"><span class="circle s"></span></label>
                    <label><input type="radio" name="r${i}" value="${it.t[1]}1N"><span class="circle l"></span></label>
                    <label><input type="radio" name="r${i}" value="${it.t[1]}3N"><span class="circle v-l"></span></label>
                    <span>ЖОҚ</span>
                </div>
            </div>`;
    });

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function calcMBTI() {
        let s = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
        for(let i=0; i<60; i++){
            let v = document.querySelector(`input[name*="${i}"]:checked`)?.value;
            if(v && v !== "0") s[v[0]] += parseInt(v[1]);
        }
        let res = (s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');
        document.getElementById('mbti-view').value = res;
        document.getElementById('mbti-res').innerHTML = `<div class="card" style="margin-top:20px; border-color:var(--yes)"><h3>Сенің типің: ${res}</h3><p>Презентацияда осы типтің маңыздылығын айт!</p></div>`;
    }

    function calcGrant() {
        let score = parseInt(document.getElementById('score').value);
        let gpa = parseFloat(document.getElementById('gpa').value);
        let bonus = (parseInt(document.getElementById('vol').value) * 0.1) + (parseInt(document.getElementById('awards').value) * 5);
        let total = (score * 0.5) + (gpa * 10) + bonus;

        const list = [
            {n:"Nazarbayev Uni", target: 95}, {n:"KBTU", target: 85}, {n:"AITU", target: 80},
            {n:"Satbayev Uni", target: 75}, {n:"ENU", target: 78}, {n:"KazNU", target: 82},
            {n:"SDU", target: 70}, {n:"KIMEP", target: 88}, {n:"Tsinghua (China)", target: 110},
            {n:"KAIST (Korea)", target: 105}, {n:"METU (Turkey)", target: 85}
        ];

        let h = "<h3>Грант шансы (Честный):</h3>";
        list.forEach(u => {
            let chance = Math.min(Math.round((total / u.target) * 100), 99);
            h += `<div class="res-card"><span>${u.n}</span><b style="color:var(--yes)">${chance}%</b></div>`;
        });
        document.getElementById('grant-res').innerHTML = h;
    }
</script>
</body>
</html>
