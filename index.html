<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>SoulCare | Professional Grant System</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #010409; --card: #0d1117; --yes: #238636; --no: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; }
        header { background: linear-gradient(135deg, #1e1b4b, #4338ca); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .nav { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav button { padding: 12px 25px; border-radius: 20px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; font-weight: bold; }
        .container { max-width: 850px; margin: 30px auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* CIRCLES */
        .q-row { margin-bottom: 40px; text-align: center; border-bottom: 1px solid #21262d; padding-bottom: 20px; }
        .q-text { font-size: 20px; margin-bottom: 25px; display: block; color: white; }
        .circles { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .circles input { display: none; }
        .circle { border-radius: 50%; border: 3px solid #484f58; cursor: pointer; display: inline-block; transition: 0.2s; }
        .v-l { width: 55px; height: 55px; } .l { width: 40px; height: 40px; } .s { width: 28px; height: 28px; }
        input[value*="Y"]:checked + .circle { background: var(--yes); border-color: var(--yes); }
        input[value*="N"]:checked + .circle { background: var(--no); border-color: var(--no); }

        /* GRID & INPUTS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 14px; color: #8b949e; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #010409; border: 1px solid #30363d; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 20px; background: #238636; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .res-item { background: #161b22; padding: 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #30363d; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>SoulCare Professional</h1>
    <div class="nav">
        <button onclick="tab('mbti')">MBTI Тест</button>
        <button onclick="tab('grant')">Грант Есептеу</button>
    </div>
</header>

<div class="container">
    <section id="mbti" class="section active">
        <div class="card">
            <h2 style="text-align:center">Тұлғалық психотипті анықтау</h2>
            <div id="mbti-container"></div>
            <button class="btn-go" onclick="calcMBTI()">НӘТИЖЕНІ ШЫҒАРУ</button>
            <div id="mbti-final"></div>
        </div>
    </section>

    <section id="grant" class="section">
        <div class="card">
            <h2>Академиялық көрсеткіштер</h2>
            <div class="grid">
                <div>
                    <label>ҰБТ балы (0-140):</label> <input type="number" id="ubt" value="110">
                    <label>SAT балы (400-1600):</label> <input type="number" id="sat" value="1200">
                    <label>IELTS / TOEFL:</label> <input type="number" id="ielts" step="0.5" value="6.0">
                    <label>GPA (0-5.0):</label> <input type="number" id="gpa" step="0.1" value="4.5">
                </div>
                <div>
                    <label>Бейіндік комбинация:</label>
                    <select id="comb">
                        <option>Математика - Физика</option>
                        <option>Математика - Информатика</option>
                        <option>Биология - Химия</option>
                        <option>География - Математика</option>
                        <option>Дүниежүзі тарихы - Ағылшын тілі</option>
                        <option>Биология - География</option>
                        <option>География - Шет тілі</option>
                        <option>Құқық негіздері - Тарих</option>
                        <option>Қазақ тілі - Қазақ әдебиеті</option>
                        <option>Орыс тілі - Орыс әдебиеті</option>
                        <option>Химия - Физика</option>
                        <option>Шығармашылық емтихан</option>
                    </select>
                    <label>Волонтерлық сағаттар:</label> <input type="number" id="vol" value="0">
                    <label>Наградалар саны:</label> <input type="number" id="awards" value="0">
                    <label>Өз MBTI типіңізді таңдаңыз:</label>
                    <select id="mbti-select">
                        <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
                        <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
                        <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
                        <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
                    </select>
                </div>
            </div>
            <button class="btn-go" style="background:#8b5cf6" onclick="calcGrant()">ШАНСТАРДЫ ТЕКСЕРУ</button>
            <div id="grant-final" style="margin-top:25px;"></div>
        </div>
    </section>
</div>

<script>
    const questions = [
        {q: "Жаңа адамдармен тез тіл табысасыз ба?", t: "EI"},
        {q: "Нақты деректерге қарағанда, қиялға көбірек сенесіз бе?", t: "SN"},
        {q: "Шешім қабылдағанда логика сезімнен маңызды ма?", t: "TF"},
        {q: "Жұмысты бастамас бұрын нақты жоспар құрасыз ба?", t: "JP"},
        {q: "Көпшілік ортада энергия жинайсыз ба?", t: "EI"},
        {q: "Заттардың қалай жұмыс істейтінін білу қызық па?", t: "SN"},
        {q: "Адамдардың көңіл-күйіне тез берілесіз бе?", t: "TF"},
        {q: "Ережелер мен тәртіпті қатаң сақтайсыз ба?", t: "JP"},
        {q: "Жалғыз қалғанда энергия жинайсыз ба?", t: "EI"},
        {q: "Болашақ туралы жиі армандайсыз ба?", t: "SN"},
        {q: "Дау-дамайда әділдікті бірінші қоясыз ба?", t: "TF"},
        {q: "Уақытты қатаң басқаруды ұнатасыз ба?", t: "JP"},
        {q: "Топтық жұмыста белсендісіз бе?", t: "EI"},
        {q: "Нақты нұсқаулықтармен жұмыс істеген оңай ма?", t: "SN"},
        {q: "Басқалардың пікірі сізге қатты әсер ете ме?", t: "TF"},
        {q: "Күтпеген оқиғалар сізге ұнай ма?", t: "JP"},
        {q: "Әңгімені бірінші болып бастайсыз ба?", t: "EI"},
        {q: "Оқиғалардың астарын (мағынасын) іздейсіз бе?", t: "SN"},
        {q: "Сыни пікірлерді суыққанды қабылдайсыз ба?", t: "TF"},
        {q: "Бөлмеңіз әрқашан жинақы ма?", t: "JP"},
        {q: "Орталықта болғанды ұнатасыз ба?", t: "EI"},
        {q: "Практикалық жұмыс теориядан маңызды ма?", t: "SN"},
        {q: "Мейірімділік әділдіктен жоғары ма?", t: "TF"},
        {q: "Заттардың өз орнында тұрғанын қалайсыз ба?", t: "JP"},
        {q: "Тез шешім қабылдайсыз ба?", t: "EI"},
        {q: "Жаңа мүмкіндіктерді іздегенді ұнатасыз ба?", t: "SN"},
        {q: "Басқаларға көмектескенді жақсы көресіз бе?", t: "TF"},
        {q: "Күнтізбемен өмір сүресіз бе?", t: "JP"},
        {q: "Көп сөйлейтін адамсыз ба?", t: "EI"},
        {q: "Мәселенің детальдарына мән бересіз бе?", t: "SN"}
    ];

    const box = document.getElementById('mbti-container');
    questions.forEach((q, i) => {
        box.innerHTML += `<div class="q-row"><span class="q-text">${i+1}. ${q.q}</span><div class="circles">
            <span style="color:var(--yes)">ИӘ</span>
            <label><input type="radio" name="r${i}" value="${q.t[0]}3Y"><span class="circle v-l"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[0]}1Y"><span class="circle l"></span></label>
            <label><input type="radio" name="r${i}" value="0"><span class="circle s"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[1]}1N"><span class="circle l"></span></label>
            <label><input type="radio" name="r${i}" value="${q.t[1]}3N"><span class="circle v-l"></span></label>
            <span style="color:var(--no)">ЖОҚ</span></div></div>`;
    });

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function calcMBTI() {
        let sc = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
        for(let i=0; i<30; i++) {
            let v = document.querySelector(`input[name="r${i}"]:checked`)?.value;
            if(v && v[0] !== '0') sc[v[0]] += parseInt(v[1]);
        }
        let res = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        document.getElementById('mbti-final').innerHTML = `<div class="card" style="margin-top:20px; border-color:var(--yes)"><h3>Сіздің типіңіз: ${res}</h3><p>Грант бөлімінде осы типті таңдауды ұмытпаңыз.</p><button class="btn-go" onclick="tab('grant')">Грантқа өту</button></div>`;
    }

    function calcGrant() {
        let ubt = parseInt(document.getElementById('ubt').value) || 0;
        let sat = parseInt(document.getElementById('sat').value) || 0;
        let ielts = parseFloat(document.getElementById('ielts').value) || 0;
        let gpa = parseFloat(document.getElementById('gpa').value) || 0;
        let vol = parseInt(document.getElementById('vol').value) || 0;
        let awards = parseInt(document.getElementById('awards').value) || 0;

        const unis = [
            {n:"Harvard Uni", l:"USA", mU:135, mS:1550, mI:7.5}, {n:"Stanford Uni", l:"USA", mU:135, mS:1500, mI:7.5}, {n:"MIT", l:"USA", mU:138, mS:1570, mI:7.5},
            {n:"KAIST", l:"Korea", mU:130, mS:1450, mI:7.0}, {n:"Seoul Nat Uni", l:"Korea", mU:130, mS:1400, mI:7.0}, {n:"Korea Uni", l:"Korea", mU:125, mS:1350, mI:6.5}, {n:"Yonsei Uni", l:"Korea", mU:125, mS:1350, mI:6.5}, {n:"Hanyang Uni", l:"Korea", mU:120, mS:1300, mI:6.0},
            {n:"Tsinghua Uni", l:"China", mU:130, mS:1450, mI:7.0}, {n:"Peking Uni", l:"China", mU:130, mS:1450, mI:7.0}, {n:"Fudan Uni", l:"China", mU:120, mS:1350, mI:6.5},
            {n:"METU", l:"Turkey", mU:110, mS:1200, mI:6.0}, {n:"Bogazici Uni", l:"Turkey", mU:115, mS:1250, mI:6.5},
            {n:"Uni of Tokyo", l:"Japan", mU:130, mS:1450, mI:7.0}, {n:"Kyoto Uni", l:"Japan", mU:125, mS:1400, mI:7.0},
            {n:"Oxford", l:"UK", mU:135, mS:1500, mI:7.5}, {n:"Cambridge", l:"UK", mU:135, mS:1500, mI:7.5}, {n:"Imperial College", l:"UK", mU:130, mS:1450, mI:7.0}, {n:"UCL", l:"UK", mU:125, mS:1400, mI:7.0}, {n:"ETH Zurich", l:"Swiss", mU:130, mS:1450, mI:7.0}, {n:"TU Munich", l:"Germany", mU:120, mS:1300, mI:6.5}, {n:"Delft Uni", l:"NL", mU:120, mS:1300, mI:6.5}, {n:"Sorbonne Uni", l:"France", mU:120, mS:1300, mI:6.5}, {n:"KU Leuven", l:"Belgium", mU:115, mS:1250, mI:6.5},
            {n:"Nazarbayev Uni", l:"KZ", mU:130, mS:1350, mI:6.5}, {n:"KBTU", l:"KZ", mU:120, mS:0, mI:5.5}, {n:"AITU", l:"KZ", mU:115, mS:0, mI:5.0}, {n:"KazNU", l:"KZ", mU:125, mS:0, mI:5.0}, {n:"ENU", l:"KZ", mU:120, mS:0, mI:5.0}, {n:"SDU", l:"KZ", mU:110, mS:0, mI:5.5}, {n:"KIMEP", l:"KZ", mU:115, mS:0, mI:6.0}, {n:"Satbayev Uni", l:"KZ", mU:110, mS:0, mI:5.0}
        ];

        let h = "<h3>Грант шансы:</h3>";
        unis.forEach(u => {
            let ch = 0;
            if(ubt >= u.mU) ch += 40; else ch += (ubt/u.mU)*30;
            if(ielts >= u.mI) ch += 30; else ch += (ielts/u.mI)*20;
            if(u.mS > 0) { if(sat >= u.mS) ch += 20; else ch += (sat/u.mS)*10; } else ch += 20;
            if(gpa >= 4.5) ch += 10;
            ch += (vol * 0.05) + (awards * 2);

            let p = Math.min(Math.round(ch), 99);
            let color = p > 70 ? "var(--yes)" : (p > 40 ? "#eab308" : "var(--no)");
            h += `<div class="res-item"><span>${u.n} (${u.l})</span><b style="color:${color}">${p}%</b></div>`;
        });
        document.getElementById('grant-final').innerHTML = h;
    }
</script>
</body>
</html>
